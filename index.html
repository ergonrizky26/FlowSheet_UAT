<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FlowSheet - UAT</title>

  <link rel="icon" type="image/png" href="assets/flowsheet-icon.png">
  <link rel="apple-touch-icon" href="assets/flowsheet-icon.png">

  <style>
    /* 2. Menghilangkan margin dan memastikan iframe memenuhi layar */
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #f8f9fa;
    }
    
    iframe { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      border: none;
      /* 3. Memastikan iframe bisa di-scroll dan menerima input */
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbzYGs72h3AgTKiltbGEXIomTG75sBdMc8pvlcEJwN_sUu4efFpihW6kUll4TjRaShz84Q/exec?env=uat"
    allow="clipboard-read; clipboard-write; geolocation; camera;"
    allowfullscreen>
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
